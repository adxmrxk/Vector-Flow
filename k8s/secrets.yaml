# =================================
# VectorFlow Secrets Template
# =================================
# IMPORTANT: This is a TEMPLATE file.
# DO NOT commit actual secrets to version control!
#
# Usage:
# 1. Copy this file: cp secrets.yaml secrets.local.yaml
# 2. Add secrets.local.yaml to .gitignore
# 3. Replace placeholder values with actual secrets
# 4. Apply: kubectl apply -f secrets.local.yaml
#
# For production, use:
# - Kubernetes External Secrets Operator
# - HashiCorp Vault
# - AWS Secrets Manager
# - Azure Key Vault
# =================================

apiVersion: v1
kind: Secret
metadata:
  name: vectorflow-secrets
  namespace: vectorflow
  labels:
    app: vectorflow
type: Opaque
stringData:
  # Pinecone API Key
  # Get from: https://app.pinecone.io/
  PINECONE_API_KEY: "your-pinecone-api-key-here"

  # Optional: Hugging Face API Token (for private models)
  # Get from: https://huggingface.co/settings/tokens
  HUGGINGFACE_TOKEN: ""

  # Optional: Database credentials (if using external DB)
  # DB_PASSWORD: "your-db-password-here"

  # Optional: JWT Secret for authentication
  # JWT_SECRET: "your-jwt-secret-here"

---
# Alternative: Using base64 encoded values
# apiVersion: v1
# kind: Secret
# metadata:
#   name: vectorflow-secrets-encoded
#   namespace: vectorflow
# type: Opaque
# data:
#   # Base64 encode: echo -n "your-secret" | base64
#   PINECONE_API_KEY: eW91ci1waW5lY29uZS1hcGkta2V5LWhlcmU=

---
