apiVersion: v1
kind: ConfigMap
metadata:
  name: vectorflow-config
  namespace: vectorflow
  labels:
    app: vectorflow
data:
  # Environment
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"

  # Service URLs (internal K8s DNS)
  GATEWAY_SERVICE_URL: "http://vectorflow-gateway:8080"
  WORKER_SERVICE_URL: "http://vectorflow-worker:8081"
  INFERENCE_SERVICE_URL: "http://vectorflow-inference:8082"

  # Model Configuration
  MODEL_NAME: "sentence-transformers/all-MiniLM-L6-v2"
  MODEL_CACHE_DIR: "/app/models"
  BATCH_SIZE: "32"
  MAX_SEQUENCE_LENGTH: "512"

  # Pinecone
  PINECONE_ENVIRONMENT: "us-east-1"
  PINECONE_INDEX_NAME: "vectorflow-index"
