apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vectorflow-ingress
  namespace: vectorflow
  labels:
    app: vectorflow
  annotations:
    # Nginx Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    # CORS headers
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  ingressClassName: nginx
  rules:
    # Frontend - main domain
    - host: vectorflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vectorflow-frontend
                port:
                  number: 80
    # API Gateway - api subdomain
    - host: api.vectorflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vectorflow-gateway
                port:
                  number: 8080
    # Alternative: Single domain with path-based routing
    - host: app.vectorflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vectorflow-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vectorflow-gateway
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: vectorflow-gateway
                port:
                  number: 8080
---
