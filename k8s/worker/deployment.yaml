apiVersion: apps/v1
kind: Deployment
metadata:
  name: vectorflow-worker
  namespace: vectorflow
  labels:
    app: vectorflow
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vectorflow
      component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: vectorflow
        component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: worker
          image: vectorflow-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vectorflow-config
            - secretRef:
                name: vectorflow-secrets
                optional: true
          env:
            - name: WORKER_HOST
              value: "0.0.0.0"
            - name: WORKER_PORT
              value: "8081"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: vectorflow
                    component: worker
                topologyKey: kubernetes.io/hostname
