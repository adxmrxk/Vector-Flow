# =========================
# VectorFlow Helm Chart Values
# =========================
# Default values for vectorflow deployment

# ----- Global Settings -----
global:
  # Environment: development, staging, production
  environment: development

  # Image pull secrets (if using private registry)
  imagePullSecrets: []

  # Common labels applied to all resources
  labels: {}

# ----- Gateway Service (Go) -----
gateway:
  enabled: true

  replicaCount: 2

  image:
    repository: vectorflow/gateway
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  env:
    LOG_LEVEL: info
    AUTH_ENABLED: "false"

  # Additional environment variables from secrets
  envFrom: []

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----- Worker Service (Rust) -----
worker:
  enabled: true

  replicaCount: 3

  image:
    repository: vectorflow/worker
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8081

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  env:
    RUST_LOG: info

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----- Inference Service (Python) -----
inference:
  enabled: true

  replicaCount: 2

  image:
    repository: vectorflow/inference
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8082

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  env:
    MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
    LOG_LEVEL: INFO

  # Model cache volume
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----- Frontend (Next.js) -----
frontend:
  enabled: true

  replicaCount: 2

  image:
    repository: vectorflow/frontend
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  env:
    NEXT_PUBLIC_API_URL: http://localhost:8080

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----- Ingress -----
ingress:
  enabled: false

  className: nginx

  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

  hosts:
    - host: vectorflow.local
      paths:
        - path: /api
          pathType: Prefix
          service: gateway
        - path: /
          pathType: Prefix
          service: frontend

  tls: []
  #  - secretName: vectorflow-tls
  #    hosts:
  #      - vectorflow.local

# ----- Service Account -----
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ----- RBAC -----
rbac:
  create: true

# ----- Pod Security -----
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ----- Network Policies -----
networkPolicy:
  enabled: false

# ----- Monitoring -----
monitoring:
  enabled: false

  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

# ----- Tracing (OpenTelemetry) -----
tracing:
  enabled: false
  endpoint: "http://jaeger:4318"

# ----- Pinecone Configuration -----
pinecone:
  # API key should be provided via secret
  apiKeySecret: ""
  apiKeySecretKey: "api-key"
  environment: "us-east-1"
  indexName: "vectorflow-index"

# ----- ConfigMap -----
configMap:
  # Additional configuration data
  data: {}
