[pytest]
# VectorFlow Test Configuration

# Test paths
testpaths = tests

# Markers
markers =
    integration: mark test as integration test (requires running services)
    slow: mark test as slow running
    unit: mark test as unit test

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Async mode
asyncio_mode = auto

# Timeout for tests (seconds)
timeout = 60

# Coverage configuration
[coverage:run]
source = go,rust/src,python/app
omit =
    */tests/*
    */__pycache__/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
