# =========================
# VectorFlow Ansible Configuration
# =========================

[defaults]
# Inventory
inventory = inventory/hosts.yml

# Roles path
roles_path = roles

# Disable host key checking for development (enable in production)
host_key_checking = False

# SSH connection settings
remote_user = ubuntu
private_key_file = ~/.ssh/vectorflow-key.pem

# Parallel execution
forks = 10

# Retry files location
retry_files_enabled = True
retry_files_save_path = /tmp/ansible-retries

# Logging
log_path = /tmp/ansible.log

# Callback plugins for better output
stdout_callback = yaml
callback_whitelist = timer, profile_tasks

# Fact caching
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 7200

# Reduce SSH connection time
pipelining = True

# Timeout settings
timeout = 30
connect_timeout = 30

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
pipelining = True

[inventory]
enable_plugins = yaml, ini, auto
